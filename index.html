<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIANG - Platform Edukasi Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.3s ease-out; }

        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .slide-down { animation: slideDown 0.3s ease-out forwards; }

        * { -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideRight { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged,
            getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, arrayUnion, arrayRemove
        };
        
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <script type="text/babel">
        const startReactApp = () => {
            const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged,
                    getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, arrayUnion, arrayRemove } = window.FirebaseAPI;

            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            const { useState, useEffect, useRef } = React;

            const API_URL = "https://script.google.com/macros/s/AKfycbz0AD7fIxJd56XA99CmCoFCJP_LIe6VJQ8LxuE9eEpfU8m9H3nZ9inQny-iK-OBoPqR/exec";

            function App() {
                const [currentTab, setCurrentTab] = useState('hero');
                const [selectedSubject, setSelectedSubject] = useState(null);
                const [isLoadingAPI, setIsLoadingAPI] = useState(false);

                const [globalNotification, setGlobalNotification] = useState('');
                const [searchQuery, setSearchQuery] = useState('');
                const [currentPage, setCurrentPage] = useState(1);
                const [itemsPerPage, setItemsPerPage] = useState(6);

                useEffect(() => {
                    setCurrentPage(1);
                    setSearchQuery('');
                }, [selectedSubject]);

                const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
                const [showPasswordModal, setShowPasswordModal] = useState(false);
                const [adminPasswordInput, setAdminPasswordInput] = useState('');
                const [passwordError, setPasswordError] = useState('');

                const [adminTab, setAdminTab] = useState('media');
                const [deleteModalConfig, setDeleteModalConfig] = useState({ isOpen: false, type: null, id: null });

                // ===== STATE EDIT & FORM =====
                const [editingMediaId, setEditingMediaId] = useState(null);
                const [editingContribId, setEditingContribId] = useState(null);
                const [editingTestiId, setEditingTestiId] = useState(null);

                // Media
                const [isAddMediaModalOpen, setIsAddMediaModalOpen] = useState(false);
                const initialMediaForm = { judul: '', kontributor: '', kurator: '', mapel: '', kelas: '', jenis: '', rating: '5', link: '', deskripsi: '' };
                const [mediaForm, setMediaForm] = useState(initialMediaForm);

                // Kontributor
                const [isAddContribModalOpen, setIsAddContribModalOpen] = useState(false);
                const initialContribForm = { name: '', role: '', initial: '', level: '', desc: '', xp: 0 };
                const [contribForm, setContribForm] = useState(initialContribForm);

                // Testimoni
                const [isEditTestiModalOpen, setIsEditTestiModalOpen] = useState(false);
                const initialTestiForm = { name: '', role: '', quote: '', rating: '5' };
                const [adminTestiForm, setAdminTestiForm] = useState(initialTestiForm);

                const [isTestiModalOpen, setIsTestiModalOpen] = useState(false);
                const [publicTesti, setPublicTesti] = useState(initialTestiForm);

                // ===== STATE LAPORAN KONTEN =====
                const [isReportModalOpen, setIsReportModalOpen] = useState(false);
                const [reportingMedia, setReportingMedia] = useState(null); // Menyimpan {id, judul}
                const initialReportForm = { name: '', school: '', reason: '' };
                const [reportForm, setReportForm] = useState(initialReportForm);

                const [user, setUser] = useState(null);
                const [likesData, setLikesData] = useState({});

                // Data Dummy
                const [mediaList, setMediaList] = useState([
                    { id: 1, judul: 'Pecahan Dasar', kontributor: 'Nisa Salsabila', kurator: 'Admin', mapel: 'Matematika', kelas: 'Kelas 4', jenis: 'Video Pembelajaran', rating: 5, link: '#', deskripsi: 'Animasi konsep pecahan dengan pizza.' },
                    { id: 2, judul: 'Pahlawan Nasional', kontributor: 'Rizky Pratama', kurator: 'Admin', mapel: 'Pancasila', kelas: 'Kelas 5', jenis: 'E-book', rating: 5, link: '#', deskripsi: 'Buku digital pahlawan kemerdekaan.' },
                ]);

                const [contributors, setContributors] = useState([
                    { id: 101, name: "Nisa Salsabila", role: "Guru SDN 1", xp: 5200, initial: "NS", level: "Level 3 - Master", desc: "Aktif membagikan video interaktif." },
                    { id: 102, name: "Rizky Pratama", role: "Guru SDN 4", xp: 4850, initial: "RP", level: "Level 2 - Contributors", desc: "Sering membuat E-book sejarah." },
                ]);

                const [testimonials, setTestimonials] = useState([
                    { id: 1, name: "Budi S.", role: "Siswa SD", quote: "Belajar matematika jadi tidak membosankan lagi sejak pakai RIANG!", rating: 5 },
                    { id: 2, name: "Siti A.", role: "Guru", quote: "Sangat membantu memberikan tugas interaktif untuk anak murid.", rating: 5 },
                ]);

                const [reports, setReports] = useState([
                    { id: 1, mediaId: 2, mediaTitle: 'Pahlawan Nasional', name: 'Andi', school: 'SDN 2 Tanjung Karang', reason: 'Terdapat kesalahan ketik pada tanggal sejarah di halaman 5.', status: 'Menunggu', date: '2026-03-04' }
                ]);

                useEffect(() => {
                    const fetchBackendData = async () => {
                        setIsLoadingAPI(true);
                        try {
                            const response = await fetch(API_URL);
                            const result = await response.json();
                            if (result.media && Array.isArray(result.media)) setMediaList(result.media);
                            if (result.contributors && Array.isArray(result.contributors)) setContributors(result.contributors);
                            if (result.testimonials && Array.isArray(result.testimonials)) setTestimonials(result.testimonials);
                            if (result.reports && Array.isArray(result.reports)) setReports(result.reports);
                        } catch (error) {
                            console.warn("Gagal mengambil data dari API, menggunakan data Dummy lokal.", error);
                        } finally {
                            setIsLoadingAPI(false);
                        }
                    };
                    fetchBackendData();
                }, []);

                useEffect(() => {
                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (e) {
                            console.error("Firebase Auth Error:", e);
                        }
                    };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (!user) return;
                    const likesRef = collection(db, 'artifacts', appId, 'public', 'data', 'media_likes');
                    const unsubscribe = onSnapshot(likesRef, (snapshot) => {
                        const newLikes = {};
                        snapshot.forEach(doc => { newLikes[doc.id] = doc.data(); });
                        setLikesData(newLikes);
                    }, (error) => {
                        console.error("Error mengambil data likes realtime:", error);
                    });
                    return () => unsubscribe();
                }, [user]);

                const postToBackend = async (actionType, payloadData) => {
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: actionType, data: payloadData })
                        });
                    } catch (error) {
                        console.error("Gagal mengirim data ke backend:", error);
                    }
                };

                const subjects = [
                    { id: 'mtk', name: 'Matematika', icon: 'fas fa-calculator', color: 'bg-purple-100 text-purple-600' },
                    { id: 'pancasila', name: 'Pancasila', icon: 'fas fa-shield-alt', color: 'bg-red-100 text-red-600' },
                    { id: 'ipas', name: 'IPAS', icon: 'fas fa-flask', color: 'bg-green-100 text-green-600' },
                    { id: 'bindo', name: 'B. Indonesia', icon: 'fas fa-font', color: 'bg-blue-100 text-blue-600' },
                    { id: 'agama', name: 'Pend. Agama', icon: 'fas fa-book-reader', color: 'bg-emerald-100 text-emerald-600' },
                    { id: 'pjok', name: 'PJOK', icon: 'fas fa-running', color: 'bg-orange-100 text-orange-600' },
                    { id: 'seni', name: 'Seni Budaya', icon: 'fas fa-palette', color: 'bg-pink-100 text-pink-600' },
                    { id: 'tik', name: 'Informatika', icon: 'fas fa-laptop-code', color: 'bg-cyan-100 text-cyan-600' },
                    { id: 'inggris', name: 'B. Inggris', icon: 'fas fa-language', color: 'bg-indigo-100 text-indigo-600' },
                    { id: 'game', name: 'Game PID', icon: 'fas fa-gamepad', color: 'bg-violet-100 text-violet-600' },
                    { id: 'lainnya', name: 'Lainnya', icon: 'fas fa-th-large', color: 'bg-slate-200 text-slate-600' }
                ];

                const switchTab = (tabId) => { setCurrentTab(tabId); setSelectedSubject(null); };
                const showToast = (msg) => { setGlobalNotification(msg); setTimeout(() => setGlobalNotification(''), 4000); };

                const handleLikeToggle = async (mediaId) => {
                    if (!user) return showToast("Sedang menghubungkan ke server...");
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'media_likes', String(mediaId));
                    const currentData = likesData[mediaId];
                    const hasLiked = currentData && currentData.likedBy && currentData.likedBy.includes(user.uid);
                    try {
                        if (!currentData) await setDoc(docRef, { count: 1, likedBy: [user.uid] });
                        else if (hasLiked) await updateDoc(docRef, { count: Math.max(0, currentData.count - 1), likedBy: arrayRemove(user.uid) });
                        else await updateDoc(docRef, { count: currentData.count + 1, likedBy: arrayUnion(user.uid) });
                    } catch (err) { showToast("Gagal menyukai materi."); }
                };

                const handleAuth = (e) => {
                    e.preventDefault();
                    if (adminPasswordInput === 'k0mbel') { 
                        setIsAdminAuthenticated(true);
                        setShowPasswordModal(false);
                        switchTab('admin');
                    } else {
                        setPasswordError('Password salah! Sila cuba lagi.');
                    }
                    setAdminPasswordInput('');
                };

                // ===== HANDLERS SUBMIT & EDIT =====

                const openAddMedia = () => { setEditingMediaId(null); setMediaForm(initialMediaForm); setIsAddMediaModalOpen(true); };
                const openEditMedia = (m) => { setEditingMediaId(m.id); setMediaForm(m); setIsAddMediaModalOpen(true); };
                
                const handleMediaSubmit = (e) => {
                    e.preventDefault();
                    if (editingMediaId) {
                        const updatedMedia = { ...mediaForm, id: editingMediaId, rating: Number(mediaForm.rating) };
                        setMediaList(mediaList.map(m => m.id === editingMediaId ? updatedMedia : m));
                        postToBackend('EDIT_MEDIA', updatedMedia);
                        showToast("Materi berhasil diperbarui!");
                    } else {
                        const newMedia = { ...mediaForm, id: Date.now(), rating: Number(mediaForm.rating) };
                        setMediaList([newMedia, ...mediaList]);
                        postToBackend('ADD_MEDIA', newMedia);
                        showToast("Materi berhasil ditambahkan!");
                    }
                    setIsAddMediaModalOpen(false);
                };

                const openAddContrib = () => { setEditingContribId(null); setContribForm(initialContribForm); setIsAddContribModalOpen(true); };
                const openEditContrib = (c) => { setEditingContribId(c.id); setContribForm(c); setIsAddContribModalOpen(true); };

                const handleContribSubmit = (e) => {
                    e.preventDefault();
                    if (editingContribId) {
                        const updatedContrib = { ...contribForm, id: editingContribId };
                        setContributors(contributors.map(c => c.id === editingContribId ? updatedContrib : c));
                        postToBackend('EDIT_CONTRIB', updatedContrib);
                        showToast("Kontributor berhasil diperbarui!");
                    } else {
                        const newContrib = { ...contribForm, id: Date.now(), xp: 0 };
                        setContributors([newContrib, ...contributors]);
                        postToBackend('ADD_CONTRIB', newContrib);
                        showToast("Kontributor berhasil ditambahkan!");
                    }
                    setIsAddContribModalOpen(false);
                };

                const openEditTesti = (t) => { setEditingTestiId(t.id); setAdminTestiForm(t); setIsEditTestiModalOpen(true); };
                
                const handleAdminTestiSubmit = (e) => {
                    e.preventDefault();
                    if (editingTestiId) {
                        const updatedTesti = { ...adminTestiForm, id: editingTestiId, rating: Number(adminTestiForm.rating) };
                        setTestimonials(testimonials.map(t => t.id === editingTestiId ? updatedTesti : t));
                        postToBackend('EDIT_TESTI', updatedTesti);
                        showToast("Testimoni berhasil diperbarui!");
                    }
                    setIsEditTestiModalOpen(false);
                };

                const handlePublicTestiSubmit = (e) => {
                    e.preventDefault();
                    const payload = { ...publicTesti, id: Date.now(), rating: Number(publicTesti.rating) };
                    setTestimonials([payload, ...testimonials]); 
                    postToBackend('ADD_TESTI', payload); 
                    setPublicTesti(initialTestiForm); 
                    setIsTestiModalOpen(false);
                    showToast("Terima kasih! Ulasan anda telah dikirim.");
                };

                // Laporan Handlers
                const openReportModal = (media) => {
                    setReportingMedia({ id: media.id, title: media.judul });
                    setReportForm(initialReportForm);
                    setIsReportModalOpen(true);
                };

                const handleReportSubmit = (e) => {
                    e.preventDefault();
                    const newReport = {
                        id: Date.now(),
                        mediaId: reportingMedia.id,
                        mediaTitle: reportingMedia.title,
                        name: reportForm.name,
                        school: reportForm.school,
                        reason: reportForm.reason,
                        status: 'Menunggu',
                        date: new Date().toISOString().split('T')[0]
                    };
                    setReports([newReport, ...reports]);
                    postToBackend('ADD_REPORT', newReport);
                    setIsReportModalOpen(false);
                    showToast("Laporan berhasil dikirim dan akan segera dievaluasi.");
                };

                const resolveReport = (id) => {
                    const updatedReports = reports.map(r => r.id === id ? { ...r, status: 'Selesai' } : r);
                    setReports(updatedReports);
                    postToBackend('EDIT_REPORT', updatedReports.find(r => r.id === id));
                    showToast("Laporan ditandai telah dievaluasi.");
                };

                // ===== HANDLERS DELETE =====
                const requestDelete = (type, id) => setDeleteModalConfig({ isOpen: true, type, id });

                const executeDelete = () => {
                    const { type, id } = deleteModalConfig;
                    if(type === 'media') { setMediaList(mediaList.filter(m => m.id !== id)); postToBackend('DELETE_MEDIA', { id }); }
                    if(type === 'kontributor') { setContributors(contributors.filter(c => c.id !== id)); postToBackend('DELETE_CONTRIB', { id }); }
                    if(type === 'testimoni') { setTestimonials(testimonials.filter(t => t.id !== id)); postToBackend('DELETE_TESTI', { id }); }
                    if(type === 'laporan') { setReports(reports.filter(r => r.id !== id)); postToBackend('DELETE_REPORT', { id }); }
                    
                    showToast('Data berhasil dihapus!');
                    setDeleteModalConfig({ isOpen: false, type: null, id: null });
                };

                const getIcon = (jenis) => {
                    if(!jenis) return 'fa-box-open';
                    if(jenis.includes('Video')) return 'fa-play-circle';
                    if(jenis.includes('E-book') || jenis.includes('Artikel')) return 'fa-book';
                    if(jenis.includes('Game')) return 'fa-gamepad';
                    if(jenis.toLowerCase().includes('media ajar')) return 'fa-chalkboard-teacher';
                    if(jenis.includes('Presentasi')) return 'fa-desktop';
                    return 'fa-box-open';
                };

                const navItems = [
                    { id: 'hero', icon: 'fa-home', labelShort: 'Home', labelLong: 'Beranda' },
                    { id: 'services', icon: 'fa-book-open', labelShort: 'Belajar', labelLong: 'Program Belajar' },
                    { id: 'contributors', icon: 'fa-trophy', labelShort: 'Kontributor', labelLong: 'Kontributor' },
                    { id: 'testimoni', icon: 'fa-comment-dots', labelShort: 'Ulasan', labelLong: 'Testimoni' },
                ];

                const getPoinFromRating = (rating) => {
                    const r = Number(rating);
                    if (r === 5) return 10; if (r === 4) return 8; if (r === 3) return 5;
                    if (r === 2) return 4; if (r === 1) return 3; return 0;
                };

                const contributorsWithPoin = contributors.map(c => {
                    let mediaPoin = 0;
                    mediaList.forEach(m => { if (m.kontributor === c.name) mediaPoin += getPoinFromRating(m.rating); });
                    return { ...c, displayPoin: (Number(c.xp) || 0) + mediaPoin };
                });

                const sortedContributors = [...contributorsWithPoin].sort((a, b) => b.displayPoin - a.displayPoin);

                const totalKonten = mediaList.length;
                const totalKontributor = contributors.length;
                const totalPoin = contributorsWithPoin.reduce((sum, c) => sum + (Number(c.displayPoin) || 0), 0);

                const itemsPerTestiPage = 6;
                const [currentTestiPage, setCurrentTestiPage] = useState(0);
                const totalTestiPages = Math.ceil(testimonials.length / itemsPerTestiPage) || 1;
                const paginatedTestimonials = testimonials.slice(currentTestiPage * itemsPerTestiPage, (currentTestiPage + 1) * itemsPerTestiPage);

                let filteredMedia = [];
                let paginatedMedia = [];
                let totalPages = 1;

                if (currentTab === 'services' && selectedSubject) {
                    let baseFiltered = mediaList.filter(m => m.mapel === selectedSubject.name);
                    if (searchQuery.trim() !== '') {
                        const query = searchQuery.toLowerCase();
                        baseFiltered = baseFiltered.filter(m => 
                            (m.judul && m.judul.toLowerCase().includes(query)) || 
                            (m.kelas && m.kelas.toLowerCase().includes(query)) || 
                            (m.jenis && m.jenis.toLowerCase().includes(query))
                        );
                    }
                    filteredMedia = baseFiltered;
                    totalPages = Math.ceil(filteredMedia.length / itemsPerPage) || 1;
                    const safeCurrentPage = Math.min(currentPage, totalPages);
                    if (safeCurrentPage !== currentPage && safeCurrentPage > 0) setCurrentPage(safeCurrentPage);
                    const startIndex = (safeCurrentPage - 1) * itemsPerPage;
                    paginatedMedia = filteredMedia.slice(startIndex, startIndex + itemsPerPage);
                }

                // Hitung laporan menunggu
                const pendingReportsCount = reports.filter(r => r.status === 'Menunggu').length;

                return (
                    <div className="flex flex-col md:flex-row h-screen w-full bg-slate-50 relative font-sans text-sm text-slate-800 overflow-hidden antialiased">
                        
                        {/* Notifikasi Global */}
                        {globalNotification && (
                            <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-[200] bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 slide-down font-bold text-sm w-max max-w-[90vw] border border-slate-700">
                                <i className="fas fa-check-circle text-emerald-400 text-lg"></i>
                                <span className="truncate">{globalNotification}</span>
                            </div>
                        )}

                        {/* Indikator Pemuatan Global */}
                        {isLoadingAPI && (
                            <div className="absolute top-0 left-0 w-full h-1 bg-red-100 z-50 overflow-hidden">
                                <div className="h-full bg-red-500 w-1/3 animate-[slideRight_1s_ease-in-out_infinite]"></div>
                            </div>
                        )}

                        {/* Header Mobile */}
                        <header className="md:hidden bg-white shadow-sm z-40 px-5 py-3 flex justify-between items-center shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white font-black text-lg shadow-md">R</div>
                                <span className="font-extrabold text-xl tracking-tight text-slate-900">RIANG</span>
                            </div>
                            <button onClick={() => { if(isAdminAuthenticated) switchTab('admin'); else setShowPasswordModal(true); }} 
                                    className={`w-9 h-9 rounded-lg flex items-center justify-center transition-colors relative ${isAdminAuthenticated && currentTab === 'admin' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-700 active:bg-slate-200'}`}>
                                <i className={`fas ${isAdminAuthenticated ? 'fa-cog' : 'fa-lock'} text-sm`}></i>
                                {isAdminAuthenticated && pendingReportsCount > 0 && (
                                    <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
                                )}
                            </button>
                        </header>

                        {/* Sidebar Desktop */}
                        <nav className="hidden md:flex flex-col w-56 lg:w-64 bg-white border-r border-slate-200 shrink-0 z-40 h-full">
                            <div className="p-5 flex items-center gap-3 border-b border-slate-100">
                                <div className="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-md shadow-red-500/30">R</div>
                                <span className="font-extrabold text-2xl tracking-tight text-slate-900">RIANG</span>
                            </div>
                            <div className="flex-1 overflow-y-auto py-5 px-3 space-y-1 hide-scrollbar">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => switchTab(item.id)} 
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all ${currentTab === item.id ? 'bg-red-50 text-red-600 shadow-sm' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}>
                                        <i className={`fas ${item.icon} text-lg w-5 text-center`}></i> {item.labelLong}
                                    </button>
                                ))}
                                <a href="https://s.id/donasi-riang" target="_blank" rel="noopener noreferrer" 
                                    className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-800 mt-2">
                                    <i className="fas fa-hand-holding-heart text-lg w-5 text-center"></i> Donasi
                                    <i className="fas fa-external-link-alt text-[10px] ml-auto opacity-70"></i>
                                </a>
                            </div>

                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setIsEditTestiModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 text-sm transition">Batal</button>
                                            <button type="submit" className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/30 text-sm transition">Simpan Perubahan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modal Tambah Testimoni (Publik) */}
                        {isTestiModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[100] px-4 py-6">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 slide-up max-h-[90vh] overflow-y-auto hide-scrollbar">
                                    <h3 className="text-xl font-bold text-slate-800 mb-1">Tulis Ulasan Anda</h3>
                                    <p className="text-sm text-slate-500 mb-5">Bagaimana pengalaman Anda menggunakan platform RIANG?</p>
                                    <form onSubmit={handlePublicTestiSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1">Nama / Inisial</label>
                                            <input type="text" required value={publicTesti.name} onChange={e => setPublicTesti({...publicTesti, name: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-red-500 text-sm" placeholder="Contoh: Budi S." />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1">Peran</label>
                                            <select required value={publicTesti.role} onChange={e => setPublicTesti({...publicTesti, role: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-red-500 text-sm">
                                                <option value="">Pilih peran Anda</option>
                                                <option value="Siswa SD">Siswa SD</option><option value="Guru">Guru / Tenaga Pendidik</option><option value="Orang Tua">Orang Tua Wali</option><option value="Umum">Umum</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1">Rating</label>
                                            <select required value={publicTesti.rating} onChange={e => setPublicTesti({...publicTesti, rating: e.target.value})} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-red-500 text-sm">
                                                <option value="5">5 Bintang - Sangat Membantu!</option><option value="4">4 Bintang - Bagus</option><option value="3">3 Bintang - Cukup</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-600 mb-1">Ulasan Singkat</label>
                                            <textarea required value={publicTesti.quote} onChange={e => setPublicTesti({...publicTesti, quote: e.target.value})} rows="3" className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-red-500 text-sm resize-none" placeholder="Tuliskan pendapat Anda..."></textarea>
                                        </div>
                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setIsTestiModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 text-sm transition">Batal</button>
                                            <button type="submit" className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/30 text-sm transition">Kirim Ulasan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Modal Konfirmasi Hapus */}
                        {deleteModalConfig.isOpen && (
                            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[150] px-4">
                                <div className="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6 slide-up text-center">
                                    <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                                        <i className="fas fa-exclamation-triangle"></i>
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2">Hapus Data?</h3>
                                    <p className="text-sm text-slate-500 mb-6">Tindakan ini tidak dapat dibatalkan.</p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setDeleteModalConfig({isOpen:false, type:null, id:null})} className="flex-1 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 text-sm transition">Batal</button>
                                        <button onClick={executeDelete} className="flex-1 py-2.5 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 text-sm transition shadow-sm">Ya, Hapus</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Navigasi Mobile */}
                        <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 flex justify-around items-center px-2 py-2 pb-safe z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => switchTab(item.id)} className={`flex flex-col items-center justify-center w-16 h-14 rounded-xl transition-all ${currentTab === item.id ? 'text-red-500 scale-105' : 'text-slate-400 hover:text-slate-600'}`}>
                                    <i className={`fas ${item.icon} text-lg mb-1`}></i>
                                    <span className="text-[10px] font-bold">{item.labelShort}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        if (window.FirebaseAPI) {
            startReactApp();
        } else {
            window.addEventListener('firebase-loaded', startReactApp);
        }
    </script>
</body>
</html>
