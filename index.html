<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIANG - Platform Edukasi Digital</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.3s ease-out; }

        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        .slide-down { animation: slideDown 0.3s ease-out forwards; }

        @keyframes slideUpFade { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .animate-podium { animation: slideUpFade 0.8s ease-out forwards; opacity: 0; }

        * { -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideRight { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Wadah untuk Aplikasi React -->
    <div id="root"></div>

    <!-- Script Utama Aplikasi -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // URL BACKEND GOOGLE APPS SCRIPT
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbz0AD7fIxJd56XA99CmCoFCJP_LIe6VJQ8LxuE9eEpfU8m9H3nZ9inQny-iK-OBoPqR/exec";

        function App() {
            const [currentTab, setCurrentTab] = useState('hero');
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [isLoadingAPI, setIsLoadingAPI] = useState(false);

            // STATE: Notifikasi Global
            const [globalNotification, setGlobalNotification] = useState('');

            // STATE: Pencarian & Pagination Program Belajar
            const [searchQuery, setSearchQuery] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(6);

            // Reset halaman dan pencarian ketika mapel berubah
            useEffect(() => {
                setCurrentPage(1);
                setSearchQuery('');
            }, [selectedSubject]);

            // STATE: Admin Auth
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState('');

            // STATE: Admin Panel
            const [adminTab, setAdminTab] = useState('media');

            // STATE: Modal Konfirmasi Hapus
            const [deleteModalConfig, setDeleteModalConfig] = useState({ isOpen: false, type: null, id: null });

            // REF: Untuk Slider Testimoni
            const testiScrollRef = useRef(null);

            // --- DATA DUMMY (Akan ditimpa jika API berhasil) ---
            const [mediaList, setMediaList] = useState([
                { id: 1, judul: 'Pecahan Dasar', kontributor: 'Nisa Salsabila', mapel: 'Matematika', kelas: 'Kelas 4', jenis: 'Video Pembelajaran', rating: 5, link: '#', deskripsi: 'Animasi konsep pecahan dengan pizza.' },
                { id: 2, judul: 'Pahlawan Nasional', kontributor: 'Rizky Pratama', mapel: 'Pancasila', kelas: 'Kelas 5', jenis: 'E-book', rating: 5, link: '#', deskripsi: 'Buku digital pahlawan kemerdekaan.' },
            ]);

            const [contributors, setContributors] = useState([
                { id: 101, name: "Nisa Salsabila", role: "Guru SDN 1", xp: 5200, initial: "N", level: "Level 3 - Master", desc: "Aktif membagikan video interaktif." },
                { id: 102, name: "Rizky Pratama", role: "Guru SDN 4", xp: 4850, initial: "R", level: "Level 2 - Contributors", desc: "Sering membuat E-book sejarah." },
            ]);

            const [testimonials, setTestimonials] = useState([
                { id: 1, name: "Budi S.", role: "Siswa SD", quote: "Belajar matematika jadi tidak membosankan lagi sejak pakai RIANG!", rating: 5 },
                { id: 2, name: "Siti A.", role: "Guru", quote: "Sangat membantu memberikan tugas interaktif untuk anak murid.", rating: 5 },
            ]);

            // --- INTEGRASI API (AMBIL DATA) ---
            useEffect(() => {
                const fetchBackendData = async () => {
                    setIsLoadingAPI(true);
                    try {
                        const response = await fetch(API_URL);
                        const result = await response.json();
                        
                        if (result.media && Array.isArray(result.media)) setMediaList(result.media);
                        if (result.contributors && Array.isArray(result.contributors)) setContributors(result.contributors);
                        if (result.testimonials && Array.isArray(result.testimonials)) setTestimonials(result.testimonials);
                        
                        console.log("Data berhasil dimuat dari Backend Apps Script.");
                    } catch (error) {
                        console.warn("Gagal mengambil data dari API, menggunakan data Dummy lokal.", error);
                    } finally {
                        setIsLoadingAPI(false);
                    }
                };

                fetchBackendData();
            }, []);

            // --- INTEGRASI API (KIRIM DATA) ---
            const postToBackend = async (actionType, payloadData) => {
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 
                            'Content-Type': 'text/plain;charset=utf-8' 
                        },
                        body: JSON.stringify({ action: actionType, data: payloadData })
                    });
                    console.log(`Perintah POST ${actionType} telah dieksekusi.`);
                } catch (error) {
                    console.error("Gagal mengirim data ke backend:", error);
                }
            };

            const subjects = [
                { id: 'mtk', name: 'Matematika', icon: 'fas fa-calculator', color: 'bg-purple-100 text-purple-600' },
                { id: 'pancasila', name: 'Pancasila', icon: 'fas fa-shield-alt', color: 'bg-red-100 text-red-600' },
                { id: 'ipas', name: 'IPAS', icon: 'fas fa-flask', color: 'bg-green-100 text-green-600' },
                { id: 'bindo', name: 'B. Indonesia', icon: 'fas fa-font', color: 'bg-blue-100 text-blue-600' },
                { id: 'agama', name: 'Pend. Agama', icon: 'fas fa-book-reader', color: 'bg-emerald-100 text-emerald-600' },
                { id: 'pjok', name: 'PJOK', icon: 'fas fa-running', color: 'bg-orange-100 text-orange-600' },
                { id: 'seni', name: 'Seni Budaya', icon: 'fas fa-palette', color: 'bg-pink-100 text-pink-600' },
                { id: 'tik', name: 'Informatika', icon: 'fas fa-laptop-code', color: 'bg-cyan-100 text-cyan-600' },
                { id: 'game', name: 'Game PID', icon: 'fas fa-gamepad', color: 'bg-violet-100 text-violet-600' },
                { id: 'lainnya', name: 'Lainnya', icon: 'fas fa-th-large', color: 'bg-slate-200 text-slate-600' }
            ];

            // --- FORM STATES ---
            const initialFormMedia = { judul: '', kontributor: '', mapel: 'Matematika', kelas: 'Kelas 1', jenis: 'Video Pembelajaran', rating: '5', link: '', deskripsi: '' };
            const [formMedia, setFormMedia] = useState(initialFormMedia);
            const [editMediaId, setEditMediaId] = useState(null);

            const initialFormContrib = { name: '', role: '', xp: '', initial: '', level: '', desc: '' };
            const [formContrib, setFormContrib] = useState(initialFormContrib);
            const [editContribId, setEditContribId] = useState(null);

            // Form untuk Admin
            const initialFormTesti = { name: '', role: '', quote: '', rating: '5' };
            const [formTesti, setFormTesti] = useState(initialFormTesti);
            const [editTestiId, setEditTestiId] = useState(null);

            // Form untuk Pengunjung Publik
            const [isTestiModalOpen, setIsTestiModalOpen] = useState(false);
            const initialPublicTesti = { name: '', role: 'Siswa', quote: '', rating: '5' };
            const [publicTesti, setPublicTesti] = useState(initialPublicTesti);

            // STATE: Testimoni Pagination & Expand
            const [currentTestiPage, setCurrentTestiPage] = useState(0);
            const [expandedTestiId, setExpandedTestiId] = useState(null);
            const itemsPerTestiPage = 6;

            // --- HANDLERS ---
            const switchTab = (tabId) => { setCurrentTab(tabId); setSelectedSubject(null); };
            
            const showToast = (msg) => { 
                setGlobalNotification(msg); 
                setTimeout(() => setGlobalNotification(''), 4000); 
            };

            const handleAuth = (e) => {
                e.preventDefault();
                if (adminPasswordInput === 'k0mbel') { 
                    setIsAdminAuthenticated(true);
                    setShowPasswordModal(false);
                    switchTab('admin');
                } else {
                    setPasswordError('Password salah! Silakan coba lagi.');
                }
                setAdminPasswordInput('');
            };

            const handleMediaSubmit = (e) => {
                e.preventDefault();
                const payload = { ...formMedia, id: editMediaId || Date.now() };
                if (editMediaId) {
                    setMediaList(mediaList.map(m => m.id === editMediaId ? payload : m));
                    showToast('Media berhasil diperbarui!');
                    postToBackend('EDIT_MEDIA', payload);
                } else {
                    setMediaList([...mediaList, payload]);
                    showToast('Media baru berhasil ditambahkan!');
                    postToBackend('ADD_MEDIA', payload);
                }
                setFormMedia(initialFormMedia); setEditMediaId(null);
            };

            const handleContribSubmit = (e) => {
                e.preventDefault();
                const payload = { ...formContrib, id: editContribId || Date.now() };
                if (editContribId) {
                    setContributors(contributors.map(c => c.id === editContribId ? payload : c));
                    showToast('Kontributor berhasil diperbarui!');
                    postToBackend('EDIT_CONTRIB', payload);
                } else {
                    setContributors([...contributors, payload]);
                    showToast('Kontributor baru berhasil ditambahkan!');
                    postToBackend('ADD_CONTRIB', payload);
                }
                setFormContrib(initialFormContrib); setEditContribId(null);
            };

            const handleTestiSubmit = (e) => {
                e.preventDefault();
                const payload = { ...formTesti, id: editTestiId || Date.now() };
                if (editTestiId) {
                    setTestimonials(testimonials.map(t => t.id === editTestiId ? payload : t));
                    showToast('Testimoni berhasil diperbarui!');
                    postToBackend('EDIT_TESTI', payload);
                } else {
                    setTestimonials([...testimonials, payload]);
                    showToast('Testimoni baru berhasil ditambahkan!');
                    postToBackend('ADD_TESTI', payload);
                }
                setFormTesti(initialFormTesti); setEditTestiId(null);
            };

            const handlePublicTestiSubmit = (e) => {
                e.preventDefault();
                const payload = { ...publicTesti, id: Date.now() };
                setTestimonials([payload, ...testimonials]); 
                postToBackend('ADD_TESTI', payload); 
                setPublicTesti(initialPublicTesti); 
                setIsTestiModalOpen(false);
                showToast("Terima kasih! Ulasan Anda telah berhasil dikirim.");
            };

            const requestDelete = (type, id) => setDeleteModalConfig({ isOpen: true, type, id });

            const executeDelete = () => {
                const { type, id } = deleteModalConfig;
                if(type === 'media') { setMediaList(mediaList.filter(m => m.id !== id)); postToBackend('DELETE_MEDIA', { id }); }
                if(type === 'kontributor') { setContributors(contributors.filter(c => c.id !== id)); postToBackend('DELETE_CONTRIB', { id }); }
                if(type === 'testimoni') { setTestimonials(testimonials.filter(t => t.id !== id)); postToBackend('DELETE_TESTI', { id }); }
                
                showToast('Data berhasil dihapus!');
                setDeleteModalConfig({ isOpen: false, type: null, id: null });
            };

            const getIcon = (jenis) => {
                if(!jenis) return 'fa-box-open';
                if(jenis.includes('Video')) return 'fa-play-circle text-blue-500';
                if(jenis.includes('E-book') || jenis.includes('Artikel')) return 'fa-book text-green-500';
                if(jenis.includes('Game')) return 'fa-gamepad text-purple-500';
                if(jenis.includes('Kuis')) return 'fa-question-circle text-orange-500';
                return 'fa-box-open text-slate-500';
            };

            const navItems = [
                { id: 'hero', icon: 'fa-home', labelShort: 'Home', labelLong: 'Beranda' },
                { id: 'services', icon: 'fa-book-open', labelShort: 'Belajar', labelLong: 'Program Belajar' },
                { id: 'contributors', icon: 'fa-trophy', labelShort: 'Kontributor', labelLong: 'Kontributor' },
                { id: 'testimoni', icon: 'fa-comment-dots', labelShort: 'Ulasan', labelLong: 'Testimoni' },
            ];

            const getPoinFromRating = (rating) => {
                const r = Number(rating);
                if (r === 5) return 10;
                if (r === 4) return 8;
                if (r === 3) return 5;
                if (r === 2) return 4;
                if (r === 1) return 3;
                return 0;
            };

            const contributorsWithPoin = contributors.map(c => {
                let mediaPoin = 0;
                mediaList.forEach(m => {
                    if (m.kontributor === c.name) {
                        mediaPoin += getPoinFromRating(m.rating);
                    }
                });
                return { ...c, displayPoin: (Number(c.xp) || 0) + mediaPoin };
            });

            const sortedContributors = [...contributorsWithPoin].sort((a, b) => b.displayPoin - a.displayPoin);

            // --- PERHITUNGAN STATISTIK BERANDA ---
            const totalKonten = mediaList.length;
            const totalKontributor = contributors.length;
            const totalPoin = contributorsWithPoin.reduce((sum, c) => sum + (Number(c.displayPoin) || 0), 0);

            // --- PERHITUNGAN TESTIMONI ---
            const totalTestiPages = Math.ceil(testimonials.length / itemsPerTestiPage) || 1;
            const paginatedTestimonials = testimonials.slice(currentTestiPage * itemsPerTestiPage, (currentTestiPage + 1) * itemsPerTestiPage);

            let filteredMedia = [];
            let paginatedMedia = [];
            let totalPages = 1;

            if (currentTab === 'services' && selectedSubject) {
                let baseFiltered = mediaList.filter(m => m.mapel === selectedSubject.name);
                if (searchQuery.trim() !== '') {
                    const query = searchQuery.toLowerCase();
                    baseFiltered = baseFiltered.filter(m => 
                        (m.judul && m.judul.toLowerCase().includes(query)) || 
                        (m.kelas && m.kelas.toLowerCase().includes(query)) || 
                        (m.jenis && m.jenis.toLowerCase().includes(query)) ||
                        (m.deskripsi && m.deskripsi.toLowerCase().includes(query))
                    );
                }
                filteredMedia = baseFiltered;
                totalPages = Math.ceil(filteredMedia.length / itemsPerPage) || 1;
                const safeCurrentPage = Math.min(currentPage, totalPages);
                if (safeCurrentPage !== currentPage && safeCurrentPage > 0) setCurrentPage(safeCurrentPage);

                const startIndex = (safeCurrentPage - 1) * itemsPerPage;
                paginatedMedia = filteredMedia.slice(startIndex, startIndex + itemsPerPage);
            }

            return (
                <div className="flex flex-col md:flex-row h-screen w-full bg-slate-50 relative font-sans text-sm text-slate-800 overflow-hidden antialiased">
                    
                    {/* GLOBAL NOTIFICATION TOAST */}
                    {globalNotification && (
                        <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-[200] bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 slide-down font-bold text-sm w-max max-w-[90vw] border border-slate-700">
                            <i className="fas fa-check-circle text-emerald-400 text-lg"></i>
                            <span className="truncate">{globalNotification}</span>
                        </div>
                    )}

                    {/* Indikator Loading Global */}
                    {isLoadingAPI && (
                        <div className="absolute top-0 left-0 w-full h-1 bg-red-100 z-50 overflow-hidden">
                            <div className="h-full bg-red-500 w-1/3 animate-[slideRight_1s_ease-in-out_infinite]"></div>
                        </div>
                    )}

                    {/* HEADER MOBILE */}
                    <header className="md:hidden bg-white shadow-sm z-40 px-5 py-3 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white font-black text-lg shadow-md">R</div>
                            <span className="font-extrabold text-xl tracking-tight text-slate-900">RIANG</span>
                        </div>
                        <button onClick={() => { if(isAdminAuthenticated) switchTab('admin'); else setShowPasswordModal(true); }} 
                                className={`w-9 h-9 rounded-lg flex items-center justify-center transition-colors ${isAdminAuthenticated && currentTab === 'admin' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-700 active:bg-slate-200'}`}>
                            <i className={`fas ${isAdminAuthenticated ? 'fa-cog' : 'fa-lock'} text-sm`}></i>
                        </button>
                    </header>

                    {/* SIDEBAR DESKTOP */}
                    <nav className="hidden md:flex flex-col w-56 lg:w-64 bg-white border-r border-slate-200 shrink-0 z-40 h-full">
                        <div className="p-5 flex items-center gap-3 border-b border-slate-100">
                            <div className="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-md shadow-red-500/30">R</div>
                            <span className="font-extrabold text-2xl tracking-tight text-slate-900">RIANG</span>
                        </div>
                        <div className="flex-1 overflow-y-auto py-5 px-3 space-y-1 hide-scrollbar">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => switchTab(item.id)} 
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all ${currentTab === item.id ? 'bg-red-50 text-red-600 shadow-sm' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}>
                                    <i className={`fas ${item.icon} text-lg w-5 text-center`}></i> {item.labelLong}
                                </button>
                            ))}
                            
                            {/* MENU DONASI BARU */}
                            <a href="https://s.id/donasi-riang" target="_blank" rel="noopener noreferrer" 
                                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-800 mt-2">
                                <i className="fas fa-hand-holding-heart text-lg w-5 text-center"></i> Donasi
                                <i className="fas fa-external-link-alt text-[10px] ml-auto opacity-70"></i>
                            </a>
                        </div>
                        <div className="p-3 border-t border-slate-100">
                            <button onClick={() => { if(isAdminAuthenticated) switchTab('admin'); else setShowPasswordModal(true); }} 
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-all ${currentTab === 'admin' ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                                <i className={`fas ${isAdminAuthenticated ? 'fa-cog' : 'fa-lock'} text-lg w-5 text-center`}></i> Admin Panel
                            </button>
                        </div>
                    </nav>

                    {/* KONTEN UTAMA */}
                    <main className="flex-1 flex flex-col overflow-y-auto pb-20 md:pb-0 relative scroll-smooth">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6 md:py-8 w-full flex-1">
                            
                            {/* HALAMAN 1: BERANDA */}
                            {currentTab === 'hero' && (
                                <div className="flex flex-col space-y-10 md:space-y-16 mt-2 md:mt-8 pb-10">
                                    
                                    {/* Bagian Atas: Teks Utama & Gambar */}
                                    <div className="slide-up flex flex-col md:flex-row items-center gap-6 md:gap-10">
                                        <div className="flex-1 space-y-4 md:space-y-5 text-center md:text-left">
                                            <div className="inline-block px-3 py-1.5 bg-red-100 text-red-600 font-bold rounded-full text-xs mb-1">
                                                Platform Edukasi Digital
                                            </div>
                                            <h1 className="text-3xl md:text-4xl lg:text-5xl font-black text-slate-900 leading-tight">
                                                Belajar Jadi <br/><span className="text-red-500">RIANG</span> dan <span className="text-black-500">Menyenangkan!</span>
                                            </h1>
                                            <p className="text-slate-600 text-sm md:text-base leading-relaxed max-w-lg mx-auto md:mx-0">
                                                RIANG (Ruang Digital yang Bermakna dan Menyenangkan) Silahkan akses ratusan materi interaktif yang dibuat oleh guru-guru hebat di seluruh Indonesia.
                                            </p>
                                            <div className="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-3 mt-4">
                                                <button onClick={() => switchTab('services')} className="w-full sm:w-auto px-6 py-3.5 md:py-3 bg-red-500 text-white text-sm md:text-base font-bold rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/30 active:scale-95 transition-all flex items-center justify-center gap-2">
                                                    Mulai Belajar <i className="fas fa-rocket text-sm"></i>
                                                </button>
                                                <a href="https://s.id/tambahkarya-riang" target="_blank" rel="noopener noreferrer" className="w-full sm:w-auto px-6 py-3.5 md:py-3 bg-red-700 text-white text-sm md:text-base font-bold rounded-xl hover:bg-red-800 shadow-lg shadow-red-700/30 active:scale-95 transition-all flex items-center justify-center gap-2">
                                                    Tambah Karya <i className="fas fa-plus-circle text-sm"></i>
                                                </a>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full flex justify-center mt-6 md:mt-0 relative">
                                            <img 
                                                src="https://imgur.com/COXCNKU.png" 
                                                alt="Ilustrasi Belajar" 
                                                className="w-full max-w-xs md:max-w-sm lg:max-w-md object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-500"
                                                onError={(e) => {
                                                    e.target.onerror = null; 
                                                    e.target.src="https://iili.io/qfFFbuj.md.png";
                                                }}
                                            />
                                        </div>
                                    </div>

                                    {/* Bagian Bawah: Statistik Platform */}
                                    <div className="slide-up grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 w-full max-w-4xl mx-auto">
                                        
                                        {/* Card Statistik 1 */}
                                        <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center text-center transform hover:-translate-y-1 transition-transform duration-300">
                                            <div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-3">
                                                <i className="fas fa-photo-video text-xl"></i>
                                            </div>
                                            <h3 className="text-3xl font-black text-slate-800">{totalKonten}</h3>
                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mt-1">Total Konten</p>
                                        </div>

                                        {/* Card Statistik 2 */}
                                        <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center justify-center text-center transform hover:-translate-y-1 transition-transform duration-300">
                                            <div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mb-3">

                                                                    <td className="p-3 text-slate-600">{item.kontributor}</td>
                                                                    <td className="p-3 text-right space-x-2">
                                                                        <button onClick={() => { setFormMedia(item); setEditMediaId(item.id); }} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100"><i className="fas fa-edit"></i></button>
                                                                        <button onClick={() => requestDelete('media', item.id)} className="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-100"><i className="fas fa-trash"></i></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                            {mediaList.length === 0 && <tr><td colSpan="4" className="p-5 text-center text-slate-400">Data media masih kosong.</td></tr>}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}

                                        {/* ADMIN TAB: KONTRIBUTOR */}
                                        {adminTab === 'kontributor' && (
                                            <div>
                                                <h3 className="text-lg font-black text-slate-800 mb-4">{editContribId ? 'Edit Kontributor' : 'Tambah Kontributor Baru'}</h3>
                                                <form onSubmit={handleContribSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-50 p-4 md:p-5 rounded-xl border border-slate-100">
                                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Nama Lengkap *</label><input required value={formContrib.name} onChange={(e) => setFormContrib({...formContrib, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" /></div>
                                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Peran / Instansi *</label><input required value={formContrib.role} onChange={(e) => setFormContrib({...formContrib, role: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Cth: Guru SDN 1" /></div>
                                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Peringkat Level *</label><input required value={formContrib.level} onChange={(e) => setFormContrib({...formContrib, level: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Cth: Level 1 - Pemula" /></div>
                                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Inisial Avatar (Opsional)</label><input maxLength="2" value={formContrib.initial} onChange={(e) => setFormContrib({...formContrib, initial: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Cth: NS" /></div>
                                                    <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-600 mb-1">Deskripsi Singkat</label><textarea rows="2" value={formContrib.desc} onChange={(e) => setFormContrib({...formContrib, desc: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none"></textarea></div>

                                                    <div className="md:col-span-2 flex gap-2 justify-end mt-2">
                                                        {editContribId && <button type="button" onClick={() => {setEditContribId(null); setFormContrib(initialFormContrib);}} className="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg text-sm hover:bg-slate-300">Batal Edit</button>}
                                                        <button type="submit" className="px-6 py-2 bg-red-500 text-white font-bold rounded-lg text-sm hover:bg-red-600"><i className="fas fa-save mr-2"></i> {editContribId ? 'Simpan Perubahan' : 'Tambah Kontributor'}</button>
                                                    </div>
                                                </form>

                                                <div className="overflow-x-auto rounded-xl border border-slate-200">
                                                    <table className="w-full text-left border-collapse whitespace-nowrap">
                                                        <thead>
                                                            <tr className="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider">
                                                                <th className="p-3 font-bold border-b border-slate-200">Nama</th>
                                                                <th className="p-3 font-bold border-b border-slate-200">Instansi</th>
                                                                <th className="p-3 font-bold border-b border-slate-200">Level</th>
                                                                <th className="p-3 font-bold border-b border-slate-200 text-right">Aksi</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="text-sm">
                                                            {contributors.map(item => (
                                                                <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                                    <td className="p-3 font-semibold text-slate-800 flex items-center gap-2">
                                                                        <div className="w-6 h-6 bg-slate-200 rounded-full flex items-center justify-center text-[10px]">{item.initial || item.name.charAt(0)}</div>
                                                                        {item.name}
                                                                    </td>
                                                                    <td className="p-3 text-slate-600">{item.role}</td>
                                                                    <td className="p-3 text-slate-600">{item.level}</td>
                                                                    <td className="p-3 text-right space-x-2">
                                                                        <button onClick={() => { setFormContrib(item); setEditContribId(item.id); }} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100"><i className="fas fa-edit"></i></button>
                                                                        <button onClick={() => requestDelete('kontributor', item.id)} className="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-100"><i className="fas fa-trash"></i></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}

                                        {/* ADMIN TAB: TESTIMONI */}
                                        {adminTab === 'testimoni' && (
                                            <div>
                                                <h3 className="text-lg font-black text-slate-800 mb-4">{editTestiId ? 'Edit Testimoni' : 'Kelola Testimoni'}</h3>
                                                {editTestiId && (
                                                    <form onSubmit={handleTestiSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-50 p-4 md:p-5 rounded-xl border border-slate-100">
                                                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Nama</label><input required value={formTesti.name} onChange={(e) => setFormTesti({...formTesti, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" /></div>
                                                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Peran</label><input required value={formTesti.role} onChange={(e) => setFormTesti({...formTesti, role: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none" /></div>
                                                        <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-600 mb-1">Ulasan</label><textarea required rows="3" value={formTesti.quote} onChange={(e) => setFormTesti({...formTesti, quote: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none"></textarea></div>
                                                        <div className="md:col-span-2 flex gap-2 justify-end mt-2">
                                                            <button type="button" onClick={() => {setEditTestiId(null); setFormTesti(initialFormTesti);}} className="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-lg text-sm hover:bg-slate-300">Batal Edit</button>
                                                            <button type="submit" className="px-6 py-2 bg-red-500 text-white font-bold rounded-lg text-sm hover:bg-red-600"><i className="fas fa-save mr-2"></i> Simpan</button>
                                                        </div>
                                                    </form>
                                                )}

                                                <div className="overflow-x-auto rounded-xl border border-slate-200">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider whitespace-nowrap">
                                                                <th className="p-3 font-bold border-b border-slate-200 w-1/4">Pengirim</th>
                                                                <th className="p-3 font-bold border-b border-slate-200">Ulasan</th>
                                                                <th className="p-3 font-bold border-b border-slate-200 text-right">Aksi</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="text-sm">
                                                            {testimonials.map(item => (
                                                                <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                                    <td className="p-3 font-semibold text-slate-800 whitespace-nowrap">{item.name} <br/><span className="text-xs text-slate-500 font-normal">{item.role}</span></td>
                                                                    <td className="p-3 text-slate-600 italic line-clamp-2">"{item.quote}"</td>
                                                                    <td className="p-3 text-right space-x-2 whitespace-nowrap">
                                                                        <button onClick={() => { setFormTesti(item); setEditTestiId(item.id); }} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100"><i className="fas fa-edit"></i></button>
                                                                        <button onClick={() => requestDelete('testimoni', item.id)} className="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-100"><i className="fas fa-trash"></i></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* === MODAL AREA === */}
                    
                    {/* MODAL: Login Admin */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden slide-up">
                                <div className="p-6">
                                    <div className="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-xl mx-auto mb-4">
                                        <i className="fas fa-lock"></i>
                                    </div>
                                    <h3 className="text-xl font-black text-center text-slate-800 mb-1">Akses Admin</h3>
                                    <p className="text-slate-500 text-center text-sm mb-6">Masukkan kata sandi untuk masuk ke panel administrator.</p>
                                    
                                    <form onSubmit={handleAuth}>
                                        <input 
                                            type="password" 
                                            autoFocus
                                            placeholder="Kata Sandi..." 
                                            value={adminPasswordInput} 
                                            onChange={(e) => { setAdminPasswordInput(e.target.value); setPasswordError(''); }}
                                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-500 text-center text-lg tracking-widest mb-2"
                                        />
                                        {passwordError && <p className="text-red-500 text-xs text-center font-bold mb-4">{passwordError}</p>}
                                        <div className="flex gap-3 mt-6">
                                            <button type="button" onClick={() => setShowPasswordModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                                            <button type="submit" className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors">Masuk</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Tambah Testimoni Publik */}
                    {isTestiModalOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden slide-up">
                                <div className="p-5 md:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-black text-lg text-slate-800 flex items-center gap-2"><i className="fas fa-pen-nib text-red-500"></i> Tulis Ulasan Anda</h3>
                                    <button onClick={() => setIsTestiModalOpen(false)} className="w-8 h-8 rounded-full bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white transition-colors flex items-center justify-center"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-5 md:p-6">
                                    <form onSubmit={handlePublicTestiSubmit} className="space-y-4">
                                        <div><label className="block text-sm font-bold text-slate-700 mb-1">Nama Panggilan *</label>
                                            <input required value={publicTesti.name} onChange={(e) => setPublicTesti({...publicTesti, name: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white" placeholder="Cth: Ibu Sari" />
                                        </div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-1">Sebagai *</label>
                                            <select required value={publicTesti.role} onChange={(e) => setPublicTesti({...publicTesti, role: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white">
                                                <option value="Siswa">Siswa / Murid</option>
                                                <option value="Guru">Guru / Pendidik</option>
                                                <option value="Orang Tua">Orang Tua / Wali</option>
                                                <option value="Masyarakat Umum">Masyarakat Umum</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-1">Ulasan / Pendapat *</label>
                                            <textarea required rows="4" value={publicTesti.quote} onChange={(e) => setPublicTesti({...publicTesti, quote: e.target.value})} className="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-red-500 outline-none bg-slate-50 focus:bg-white" placeholder="Bagaimana pengalaman Anda menggunakan RIANG?"></textarea>
                                        </div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-2">Penilaian</label>
                                            <div className="flex gap-2">
                                                {[1,2,3,4,5].map(star => (
                                                    <button key={star} type="button" onClick={() => setPublicTesti({...publicTesti, rating: star.toString()})} className="text-2xl transition-transform hover:scale-110 focus:outline-none">
                                                        <i className={`fas fa-star ${star <= Number(publicTesti.rating) ? 'text-yellow-400' : 'text-slate-200'}`}></i>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-slate-100">
                                            <button type="submit" className="w-full py-3.5 bg-red-500 text-white font-black rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">Kirim Ulasan</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Konfirmasi Hapus Data (Admin) */}
                    {deleteModalConfig.isOpen && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden slide-up p-6 text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                                    <i className="fas fa-exclamation-triangle"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800 mb-2">Hapus Data Ini?</h3>
                                <p className="text-slate-500 text-sm mb-6">Tindakan ini tidak dapat dibatalkan. Data {deleteModalConfig.type} ini akan dihapus secara permanen.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteModalConfig({isOpen: false, type: null, id: null})} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={executeDelete} className="flex-1 py-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition-colors">Ya, Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
